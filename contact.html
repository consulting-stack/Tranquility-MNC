<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Tranquility MNC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Contact Us</h1>

  <p>
    Have questions or need care? Fill out the form below and a member of our team
    will get back to you as soon as possible.
  </p>

  <hr>

  <!-- CONTACT FORM -->
  <form action="#" method="POST">

    <label for="name">Full Name</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="phone">Phone Number</label><br>
    <input type="tel" id="phone" name="phone"><br><br>

    <label for="service">Service Needed</label><br>
    <select id="service" name="service">
      <option value="">Select a service</option>
      <option>In-Home Nursing Care</option>
      <option>Post-Surgical Care</option>
      <option>Medication Management</option>
      <option>Chronic Disease Management</option>
      <option>Wellness Visits</option>
      <option>Companion Care</option>
    </select><br><br>

    <label for="message">Message</label><br>
    <textarea id="message" name="message" rows="5" required></textarea><br><br>

    <button type="submit">Submit Request</button>

  </form>

  <hr>

  <!-- CONTACT INFO -->
  <h2>Direct Contact</h2>

  <p><strong>Email:</strong> info@tranquilitymnc.com</p>
  <p><strong>Phone:</strong> (XXX) XXX-XXXX</p>
  <p><strong>Service Area:</strong> [Your City, State]</p>

  <script src="script.js"></script>

</body>
</html>
